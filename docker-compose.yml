# Default: only the Nest `app` image is built/running; Postgres is your host machine at localhost:5432
# (from inside the container that is host.docker.internal:5432 — see Docker Desktop / extra_hosts below).
#
# Optional bundled Postgres:
#   docker compose --profile with-db up --build

services:
  db:
    profiles:
      - with-db
    image: postgres:16-alpine
    container_name: fundamental-db
    environment:
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-admin123}
      POSTGRES_DB: ${DB_NAME:-postgres}
    ports:
      - "${DB_PORT_ON_HOST:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_NAME:-postgres}",
        ]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fundamental-app
    ports:
      - "4040:4040"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 4040
      DB_HOST: ${DOCKER_APP_DB_HOST:-host.docker.internal}
      DB_PORT: ${DOCKER_APP_DB_PORT:-5432}

volumes:
  pgdata:
