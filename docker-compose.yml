# Two Postgres setups:
# - Default: app uses service `db` (empty volume until you migrate/seed).
# - Same data as on your Mac: set DOCKER_APP_DB_HOST=host.docker.internal in .env, then either
#   stop publishing db on 5432 (change DB_PORT_ON_HOST) or run: docker compose up --no-deps app
services:
  db:
    image: postgres:16-alpine
    container_name: fundamental-db
    environment:
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-admin123}
      POSTGRES_DB: ${DB_NAME:-postgres}
    # Host port (DBeaver, etc.) → container 5432 (Postgres always listens on 5432 inside the image).
    ports:
      - "${DB_PORT_ON_HOST:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_NAME:-postgres}",
        ]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fundamental-app
    ports:
      - "4040:4040"
    # Lets the app reach Postgres on the host (same DB as DBeaver at 127.0.0.1) when DOCKER_APP_DB_HOST is set.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 4040
      # Default `db` = Postgres in this compose file (own volume, often empty vs your Mac install).
      # Set DOCKER_APP_DB_HOST=host.docker.internal in .env to use the Postgres on your machine instead.
      DB_HOST: ${DOCKER_APP_DB_HOST:-db}
      DB_PORT: ${DOCKER_APP_DB_PORT:-5432}
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
